<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>For Prof. Martin 🎓</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4ef;
      color: #333;
      min-height: 100vh;
    }

    /* ===== OVERLAY ===== */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 16px;
    }

    .card {
      background: #ffffff;
      padding: 36px 28px 28px;
      border-radius: 20px;
      text-align: center;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
    }

    .card .step-badge {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #7a9e7e;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
      color: #222;
    }

    .card .subtitle {
      font-size: 0.88rem;
      color: #999;
      margin-bottom: 24px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .opt-btn {
      padding: 11px 16px;
      border-radius: 12px;
      border: 1.5px solid #e0e0e0;
      background: #fafafa;
      cursor: pointer;
      font-size: 0.95rem;
      color: #333;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }

    .opt-btn:hover {
      background: #edf5ee;
      border-color: #7a9e7e;
    }

    .opt-btn .label {
      font-weight: 600;
      color: #7a9e7e;
      margin-right: 8px;
    }

    /* shake animation for wrong answer */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    .wrong-msg {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #c0392b;
      min-height: 20px;
    }

    /* ===== MAIN CONTENT ===== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    .intro {
      text-align: center;
      margin-bottom: 28px;
    }

    .intro h1 {
      font-size: 1.7rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #2c2c2c;
    }

    .intro p {
      font-size: 1rem;
      line-height: 1.65;
      color: #777;
      max-width: 560px;
      margin: 0 auto;
    }

    .book-wrapper {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 36px rgba(0,0,0,0.1);
      background: #fff;
    }

    .book-wrapper iframe {
      display: block;
      width: 100%;
      height: 85vh;
      border: none;
    }

    footer {
      text-align: center;
      margin-top: 28px;
      font-size: 0.82rem;
      color: #bbb;
    }
  </style>
</head>

<body>

  <!-- ===== QUESTION OVERLAY ===== -->
  <div id="overlay">
    <div class="card" id="quiz-card">

      <!-- Q1 -->
      <div id="q1">
        <div class="step-badge">Step 1 of 2</div>
        <h2>Who are you? 👀</h2>
        <p class="subtitle">Please identify yourself to continue.</p>
        <div class="options">
          <button class="opt-btn" onclick="answer(1,'A')"><span class="label">A</span> Prof. Martin</button>
          <button class="opt-btn" onclick="answer(1,'B')"><span class="label">B</span> Keira</button>
          <button class="opt-btn" onclick="answer(1,'C')"><span class="label">C</span> idk</button>
        </div>
        <div class="wrong-msg" id="err1"></div>
      </div>

      <!-- Q2 (hidden initially) -->
      <div id="q2" style="display:none;">
        <div class="step-badge">Step 2 of 2</div>
        <h2>Who wrote this card? ✍️</h2>
        <p class="subtitle">One more question!</p>
        <div class="options">
          <button class="opt-btn" onclick="answer(2,'A')"><span class="label">A</span> Keira</button>
          <button class="opt-btn" onclick="answer(2,'B')"><span class="label">B</span> 李沛妤</button>
          <button class="opt-btn" onclick="answer(2,'C')"><span class="label">C</span> Khanun</button>
        </div>
        <div class="wrong-msg" id="err2"></div>
      </div>

    </div>
  </div>

  <!-- ===== MAIN PAGE ===== -->
  <div class="container">
    <div class="intro">
      <h1>Dear Prof. Martin 🎓</h1>
      <p>Thank you for everything. Here's a little something made just for you.</p>
    </div>

    <div class="book-wrapper">
      <iframe
        allowfullscreen="allowfullscreen"
        allow="autoplay; fullscreen; clipboard-write"
        scrolling="no"
        src="https://heyzine.com/flip-book/584bcdd4a6.html">
      </iframe>
    </div>

    <footer>Made with 🤍 Keira</footer>
  </div>

  <script>
    var correct = { 1: 'A', 2: 'A' };

    function answer(q, choice) {
      var errEl = document.getElementById('err' + q);
      if (choice !== correct[q]) {
        errEl.textContent = 'Hmm, that\'s not right. Try again!';
        var card = document.getElementById('quiz-card');
        card.classList.remove('shake');
        void card.offsetWidth;
        card.classList.add('shake');

        // wrong on Q2 → reset to Q1
        if (q === 2) {
          setTimeout(function() {
            document.getElementById('q2').style.display = 'none';
            document.getElementById('q1').style.display = 'block';
            document.getElementById('err1').textContent = '';
          }, 900);
        }
        return;
      }

      errEl.textContent = '';

      if (q === 1) {
        document.getElementById('q1').style.display = 'none';
        document.getElementById('q2').style.display = 'block';
      } else {
        // both correct → close overlay
        document.getElementById('overlay').style.display = 'none';
      }
    }
  </script>

</body>
</html>
